services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3
    restart: unless-stopped
    ports:
      - "${WOODPECKER_PORT:-8000}:8000"
    environment:
      WOODPECKER_HOST: ${WOODPECKER_HOST:-http://localhost:8000}
      WOODPECKER_ADMIN: ${WOODPECKER_ADMIN:?set the GitHub/GitLab username allowed to administer CI}
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:?set a strong shared agent secret}
      WOODPECKER_OPEN: ${WOODPECKER_OPEN:-false}
      WOODPECKER_GITHUB: ${WOODPECKER_GITHUB:-false}
      WOODPECKER_GITHUB_CLIENT: ${WOODPECKER_GITHUB_CLIENT:-}
      WOODPECKER_GITHUB_SECRET: ${WOODPECKER_GITHUB_SECRET:-}
      WOODPECKER_GITLAB: ${WOODPECKER_GITLAB:-false}
      WOODPECKER_GITLAB_CLIENT: ${WOODPECKER_GITLAB_CLIENT:-}
      WOODPECKER_GITLAB_SECRET: ${WOODPECKER_GITLAB_SECRET:-}
      WOODPECKER_GITLAB_URL: ${WOODPECKER_GITLAB_URL:-https://gitlab.com}
    volumes:
      - woodpecker_server:/var/lib/woodpecker

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3
    restart: unless-stopped
    depends_on:
      - woodpecker-server
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET:?set a strong shared agent secret}
      WOODPECKER_BACKEND: docker
      WOODPECKER_BACKEND_DOCKER_VOLUMES: /var/run/docker.sock:/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  woodpecker_server:
